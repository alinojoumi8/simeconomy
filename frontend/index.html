<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SimEconomy Dashboard</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="top">
    <div>
      <h1>SimEconomy</h1>
      <p class="sub">v1.0 · full economy · VC · equities · macro · lifecycle</p>
    </div>
    <div class="status" id="statusPill">Day 0 · paused</div>
  </header>

  <section class="controls">
    <button id="btnStep1">Step 1 day</button>
    <button id="btnStep7">Step 7 days</button>
    <button id="btnStep30">Step 30 days</button>
    <button id="btnAuto">Auto-run</button>
    <button id="btnStop">Pause / stop</button>
    <button id="btnReset" class="danger">Reset</button>
    <select id="shockType">
      <option value="rate_hike">Shock: rate hike +50bps</option>
      <option value="rate_cut">Shock: rate cut -25bps</option>
      <option value="illness_wave">Shock: illness wave</option>
      <option value="energy_spike">Shock: energy +40%</option>
      <option value="energy_drop">Shock: energy -20%</option>
      <option value="cash_grant">Shock: cash grant</option>
    </select>
    <button id="btnShock">Inject shock</button>
  </section>

  <section class="cards" id="cards"></section>

  <main class="grid">
    <section class="panel">
      <h2>Agents <span class="muted" id="agentCount"></span></h2>
      <div class="table-wrap">
        <table id="agentsTable">
          <thead>
            <tr>
              <th>Name</th><th>Role</th><th>Health</th><th>Opinion</th><th>Cash</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <h3>Agent inspector</h3>
      <select id="agentSelect"></select>
      <div id="agentDetail" class="item muted">Select an agent</div>
    </section>

    <section class="panel">
      <h2>Companies, VC &amp; jobs</h2>
      <div id="companies"></div>
      <h3>VC deals</h3>
      <div id="vcDeals"></div>
      <h3>Open jobs</h3>
      <div id="jobs"></div>
    </section>

    <section class="panel">
      <h2>Equity market</h2>
      <div id="market"></div>
    </section>

    <section class="panel">
      <h2>News</h2>
      <div id="news" class="feed"></div>
    </section>

    <section class="panel" style="grid-column: 1 / -1">
      <h2>Event log</h2>
      <div id="events" class="feed"></div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
